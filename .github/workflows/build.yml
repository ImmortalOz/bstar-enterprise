name: Build B. Star APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
      - name: Scaffold android folder
        run: |
          flutter create --org com.bstarenterprises --project-name bstar_app /tmp/scaffold
          cp -r /tmp/scaffold/android ./android
          cp -r /tmp/scaffold/web ./web
          cp -r /tmp/scaffold/test ./test
      - run: mkdir -p lib
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: BStarEnterprise-APK
          path: build/app/outputs/flutter-apk/app-release.apk
